<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Kingshot Rally Timer Admin</title><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#07111f"><link rel="stylesheet" href="style.css"></head><body><div class="app admin-app"><div class="topbar"><div class="theme-toggle-wrap"><span>Dark</span><label class="switch"><input id="themeSwitch" type="checkbox" onchange="setThemeFromSwitch(this.checked)"><span class="slider"></span></label><span>Light</span></div></div><div class="header"><h1>Kingshot Rally Timer</h1><div class="subtitle">Admin Page</div></div><div id="lockScreen" class="card pin-card"><h2>Admin Locked</h2><label>Admin PIN</label><input id="adminPin" type="password" placeholder="Admin PIN"><button class="good" onclick="unlockAdmin()">Unlock Admin</button></div><div id="adminApp" class="hidden"><div class="admin-grid"><div class="card admin-full"><h2>Active Rally Instances</h2><div id="activeRallyList"><div class="empty-state">No active rallies.</div></div></div><div class="card"><h2>Create Rally Profile</h2><label>Rally Name</label><input id="profileName" placeholder="Enemy / rally name"><label>Enemy March Time MM:SS</label><input id="profileMarchTime" placeholder="00:25" maxlength="5"><button class="good" onclick="saveProfile()">Save Profile</button><div class="hint">GO starts the visible 5:00 in-game rally timer. Adjust it to match the game, then Send to players.</div></div><div class="card"><h2>Rally Profiles</h2><div id="profileList"><div class="empty-state">No rally profiles.</div></div></div><div class="card admin-full"><h2>Active Players</h2><div id="playerList"><div class="empty-state">No active players.</div></div></div></div><button class="secondary" onclick="lockAdmin()">Lock Admin</button></div></div><script type="module" src="admin.js"></script></body></html>
