<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Kingshot Rally Timer</title><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#07111f"><link rel="stylesheet" href="style.css"></head><body><div class="app"><section id="loginView"><div class="login-brand"><div class="login-crown">♛</div><h1>Kingshot</h1><div class="login-subtitle">Rally Timer</div></div><div class="card login-card"><h2>Player Login</h2><label>Player Name</label><input id="loginName" placeholder="Player name"><label>March Time MM:SS</label><input id="loginMarchTime" placeholder="00:49" maxlength="5"><button class="good" onclick="loginPlayer()">Login / Save</button></div></section><section id="playerView" class="hidden"><div class="topbar"><div class="theme-toggle-wrap"><span>Dark</span><label class="switch"><input id="themeSwitch" type="checkbox" onchange="setThemeFromSwitch(this.checked)"><span class="slider"></span></label><span>Light</span></div></div><div class="player-welcome"><div class="welcome-small">Welcome</div><h1 id="welcomeName">Player</h1></div><div class="card"><h2>Send Offset</h2><div class="march-row"><button class="secondary" onclick="adjustSendOffset(-0.5)">-</button><input id="sendOffsetInput" class="march-time-input" readonly><button class="secondary" onclick="adjustSendOffset(0.5)">+</button><button class="good" onclick="setSendOffset()">Set</button></div><div id="offsetStatus" class="status"></div></div><div class="card"><h2>Active Rallies</h2><div id="activeRallies" class="rally-list"><div class="empty-state">No active rallies.</div></div></div></section></div><script type="module" src="player.js"></script></body></html>
